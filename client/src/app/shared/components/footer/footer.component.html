<div class="footer-inner">
  <small class="copyright">&copy; {{ year }} Extriviate</small>

  <label for="theme-select">
    Theme:
    <select id="theme-select" class="theme-select" (change)="onThemeChange($event)">
      @for (option of themeOptions; track option.value) {
        <option [value]="option.value" [selected]="themeService.activeTheme() === option.value">
          {{ option.label }}
        </option>
      }
    </select>
  </label>

  <nav aria-label="Legal">
    <a routerLink="/privacy" class="nav-link">Privacy Policy</a>
  </nav>
</div>
