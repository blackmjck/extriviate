<header class="site-header">
  <div class="site-header__inner">
    <a routerLink="/" class="site-header__logo" aria-label="Extriviate home">
      <span class="site-header__logo-mark" aria-hidden="true">E</span>
      <span class="site-header__logo-name">Extriviate</span>
    </a>

    <nav aria-label="User navigation">
      @if (isAuthenticated()) {
        <a routerLink="/profile" class="site-header__user-link" aria-label="Go to your profile">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
            focusable="false"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </a>
      } @else {
        <a routerLink="/login" class="site-header__user-link" aria-label="Log in">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="22"
            height="22"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
            focusable="false"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
        </a>
      }
    </nav>
  </div>
</header>
