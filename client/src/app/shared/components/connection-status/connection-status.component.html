@if (socket.reconnecting()) {
  <div class="reconnect-banner" role="status" aria-live="polite">
    <span class="spinner" aria-hidden="true"></span>
    @if (socket.connectionState() === 'connecting') {
      <span class="banner-text">Reconnecting&hellip;</span>
    } @else {
      <span class="banner-text">Connection lost &mdash; waiting to reconnect&hellip;</span>
    }
  </div>
}
