<div class="board-container" [class.portrait-compact]="showOrientationPrompt()">
  @if (showOrientationPrompt()) {
    <div class="orientation-prompt" role="alert" aria-live="polite">
      <span class="orientation-icon" aria-hidden="true">&#8635;</span>
      <p>Rotate your device for the best experience</p>
    </div>
  }

  <div class="board-grid">
    <!-- Category headers -->
    @for (cat of categories(); track cat.id) {
      <div class="category-header">
        <span class="category-name">{{ cat.category.name }}</span>
      </div>
    }

    <!-- Question rows -->
    @for (row of rowIndices(); track row) {
      @for (cat of categories(); track cat.id) {
        @let question = getQuestionAt(cat, row);
        <button
          class="cell"
          [class.answered]="isAnswered(question)"
          [class.not-your-turn]="!isAnswered(question) && !canSelectQuestion()"
          [disabled]="isAnswered(question) || !canSelectQuestion()"
          [attr.aria-label]="getCellAriaLabel(question)"
          (click)="selectCell(question)"
        >
          @if (!isAnswered(question) && question) {
            <span class="point-value">${{ question.pointValue }}</span>
          }
        </button>
      }
    }
  </div>

  <!-- Player gallery strip + media controls -->
  <div class="bottom-bar">
    <app-media-controls [playerId]="localPlayerId()" />
    <app-player-gallery
      [players]="players()"
      [activePlayerId]="activePlayerId()"
      [questionSelecterId]="questionSelecterId()"
      [submittedAnswer]="submittedAnswer()"
      [showScores]="true"
      layout="row"
    />
  </div>
</div>
