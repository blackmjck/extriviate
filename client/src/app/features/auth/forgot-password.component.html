<section class="forgot-password-page">
  <div class="auth-card">
    <h1 class="auth-title">Forgot your password?</h1>

    @if (responseMessage()) {
      <div class="response-banner" role="status" aria-live="polite">{{ responseMessage() }}</div>
    }

    @if (navMessage()) {
      <div class="info-banner" role="status" aria-live="polite">{{ navMessage() }}</div>
    }

    @if (errorMessage()) {
      <div class="error-banner" role="alert" aria-live="assertive">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <input
        type="email"
        id="confirm-email"
        name="confirm_email"
        tabindex="-1"
        aria-hidden="true"
        autocomplete="off"
        (input)="setHP($event)"
        (change)="setHP($event)"
      />

      <ngx-turnstile
        #turnstile
        class="turnstile"
        [siteKey]="CF_SITE_KEY"
        theme="auto"
        (resolved)="onCaptcha($event)"
        (errored)="onCaptcha($event, true)"
      ></ngx-turnstile>

      <button type="submit" class="btn-primary" [disabled]="disabled()">
        @if (showWorking()) {
          Checking...
        } @else if (showLoading()) {
          Loading...
        } @else {
          Recover
        }
      </button>
      @if (disabledHint()) {
        <p class="form-hint" role="status" aria-live="polite">{{ disabledHint() }}</p>
      }
    </form>

    <p class="auth-link">Already have an account? <a routerLink="/login">Sign in</a></p>
    <p class="auth-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
  </div>
</section>
