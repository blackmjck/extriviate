<section class="reset-password-page">
  <div class="auth-card">
    <h1 class="auth-title">Reset your password</h1>

    @if (responseMessage()) {
      <div class="response-banner" role="status" aria-live="polite">{{ responseMessage() }}</div>
    }

    @if (errorMessage()) {
      <div class="error-banner" role="alert" aria-live="assertive">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="password">New Password</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="new-password"
          minlength="8"
          maxlength="72"
        />
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm New Password</label>
        <input
          id="confirm-password"
          type="password"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          name="confirm_password"
          placeholder="Re-enter your password"
          required
          autocomplete="new-password"
          minlength="8"
          maxlength="72"
        />
        @if (confirmPassword().length && password() !== confirmPassword()) {
          <span class="field-error" role="alert">Passwords do not match</span>
        }
      </div>

      <input
        type="email"
        id="confirm-email"
        name="confirm_email"
        tabindex="-1"
        class="hp"
        aria-hidden="true"
        autocomplete="off"
        (input)="setHP($event)"
        (change)="setHP($event)"
        (blur)="setHP($event)"
      />

      <ngx-turnstile
        #turnstile
        class="turnstile"
        [siteKey]="CF_SITE_KEY"
        theme="auto"
        (resolved)="onCaptcha($event)"
        (errored)="onCaptcha($event, true)"
      ></ngx-turnstile>

      <button type="submit" class="btn-primary" [disabled]="disabled()">
        @if (showWorking()) {
          Resetting...
        } @else if (showLoading()) {
          Loading...
        } @else {
          Reset
        }
      </button>
    </form>
  </div>
</section>
