<div class="signup-page">
  <div class="auth-card">
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Join the trivia action</p>

    @if (errorMessage()) {
      <div class="error-banner" role="alert" aria-live="assertive">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="displayName">Display Name</label>
        <input
          id="displayName"
          type="text"
          [ngModel]="displayName()"
          (ngModelChange)="displayName.set($event)"
          name="displayName"
          placeholder="Your name"
          required
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <input
        type="email"
        id="confirm-email"
        name="confirm_email"
        tabindex="-1"
        class="hp"
        aria-hidden="true"
        autocomplete="off"
        (input)="setHP($event)"
        (change)="setHP($event)"
        (blur)="setHP($event)"
      />

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="Create a password"
          required
          autocomplete="new-password"
          minlength="8"
          maxlength="72"
        />
        @if (password().length) {
          <app-password-strength-meter
            [password]="password()"
            (pass)="measureStrength($event)"
          ></app-password-strength-meter>
        }
      </div>

      <ngx-turnstile
        class="turnstile"
        [siteKey]="CF_SITE_KEY"
        theme="auto"
        (resolved)="onCaptcha($event)"
        (errored)="onCaptcha($event, true)"
      ></ngx-turnstile>

      <button type="submit" class="btn-primary" [disabled]="disabled()">
        @if (showWorking()) {
          Creating account...
        } @else if (showLoading()) {
          Loading...
        } @else {
          Sign Up
        }
      </button>
    </form>

    <p class="auth-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </div>
</div>
