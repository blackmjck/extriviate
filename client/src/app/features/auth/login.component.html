<div class="login-page">
  <div class="auth-card">
    <h1 class="auth-title">Sign In</h1>
    <p class="auth-subtitle">Welcome back to Extriviate</p>

    @if (errorMessage()) {
      <div class="error-banner" role="alert" aria-live="assertive">{{ errorMessage() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <input
        type="email"
        id="confirm-email"
        name="confirm_email"
        tabindex="-1"
        class="hp"
        aria-hidden="true"
        autocomplete="off"
        (input)="setHP($event)"
        (change)="setHP($event)"
        (blur)="setHP($event)"
      />

      <ngx-turnstile
        class="turnstile"
        [siteKey]="CF_SITE_KEY"
        theme="auto"
        (resolved)="onCaptcha($event)"
        (errored)="onCaptcha($event, true)"
      ></ngx-turnstile>

      <button type="submit" class="btn-primary" [disabled]="disabled()">
        @if (showWorking()) {
          Signing in...
        } @else if (showLoading()) {
          Loading...
        } @else {
          Sign In
        }
      </button>
      @if (disabledHint()) {
        <p class="form-hint" role="status" aria-live="polite">{{ disabledHint() }}</p>
      }
    </form>

    <p class="auth-link"><a routerLink="/forgot-password">Forgot your password?</a></p>
    <p class="auth-link">Don't have an account? <a routerLink="/signup">Sign up</a></p>
  </div>
</div>
