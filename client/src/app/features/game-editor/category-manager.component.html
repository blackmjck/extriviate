<div class="cat-manager">
  @if (error()) {
    <div class="error-banner">{{ error() }}</div>
  }

  @if (!showForm()) {
    <button class="btn btn--primary btn--sm" (click)="openCreateForm()">New Category</button>
  }

  @if (showForm()) {
    <form class="cat-form" (ngSubmit)="submitForm()">
      <div class="cat-form__field">
        <label class="label" for="cat-name">Name</label>
        <input
          id="cat-name"
          class="input"
          type="text"
          [ngModel]="formName()"
          (ngModelChange)="formName.set($event)"
          name="name"
          maxlength="100"
          required
        />
      </div>
      <div class="cat-form__field">
        <label class="label" for="cat-desc">Description</label>
        <input
          id="cat-desc"
          class="input"
          type="text"
          [ngModel]="formDescription()"
          (ngModelChange)="formDescription.set($event)"
          name="description"
        />
      </div>
      <div class="cat-form__actions">
        <button class="btn btn--primary btn--sm" type="submit">
          {{ editing() ? 'Update' : 'Create' }}
        </button>
        <button class="btn btn--ghost btn--sm" type="button" (click)="cancelForm()">Cancel</button>
      </div>
    </form>
  }

  @if (loading()) {
    <p class="loading-text">Loading categories...</p>
  } @else {
    <ul class="cat-list">
      @for (cat of categories(); track cat.id) {
        <li class="cat-list__item">
          <button class="cat-list__select" (click)="selectCategory(cat.id)">
            <span class="cat-list__name">{{ cat.name }}</span>
            @if (cat.description) {
              <span class="cat-list__desc">{{ cat.description }}</span>
            }
          </button>
          <div class="cat-list__actions">
            <button class="btn btn--ghost btn--xs" (click)="openEditForm(cat)">Edit</button>
            <button class="btn btn--danger-ghost btn--xs" (click)="deleteCategory(cat.id)">Del</button>
          </div>
        </li>
      } @empty {
        <li class="cat-list__empty">No categories yet. Create one above.</li>
      }
    </ul>
  }
</div>
